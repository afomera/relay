# docker-compose for relay self-hosting.
#
# Prereqs:
#   - A base domain you control (set `RELAY_BASE` below).
#   - A Cloudflare API token with Zone:DNS:Edit on that zone.
#   - Zone id for the base domain.
#
# Start: `docker compose up -d`

services:
  relayd:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      RUST_LOG: info
      RELAY_DATA_KEY: ${RELAY_DATA_KEY}
      GITHUB_OAUTH_SECRET: ${GITHUB_OAUTH_SECRET}
      CLOUDFLARE_API_TOKEN: ${CLOUDFLARE_API_TOKEN}
      # Optional. When set, relayd picks it up via `db.url_env = "DATABASE_URL"`
      # in relayd.toml and talks Postgres. Unset → on-disk SQLite under
      # /var/lib/relay. Point this at a managed Postgres (PlanetScale, Neon,
      # Fly) or at the sibling `postgres` service below.
      DATABASE_URL: ${DATABASE_URL:-}
    volumes:
      - ./relayd.toml:/etc/relay/relayd.toml:ro
      - relay-data:/var/lib/relay
    restart: unless-stopped
    depends_on:
      - postgres

  postgres:
    image: postgres:18.3-alpine
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: relay
    volumes:
      - relay-pg:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  relay-data:
  relay-pg:
