name: Release

# Two ways to cut a release:
#
#  1. Tag push — `git tag v0.1.0 && git push origin v0.1.0` (wrapped by
#     `make release VERSION=0.1.0` locally). Workflow picks up the tag
#     automatically.
#
#  2. Manual dispatch — Actions → Release → Run workflow, enter `0.1.0`
#     (or `v0.1.0`). Workflow verifies Cargo.toml matches, tags main's
#     HEAD, pushes the tag, then does the build.
#
# Either way the workflow builds the CLI, attaches binaries to a GitHub
# Release, and auto-bumps `Formula/relay.rb` on main.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. 0.1.0 or v0.1.0. Cargo.toml must match.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: resolve version + tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - id: resolve
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ inputs.version }}"
            VERSION="v${RAW#v}"                           # normalize to v prefix
            PLAIN="${VERSION#v}"

            # Cargo.toml sanity check — catches "I meant to bump the version
            # but forgot" before it ships a binary that reports the old version.
            if ! grep -q "^version = \"${PLAIN}\"$" Cargo.toml; then
              echo "::error::Cargo.toml [workspace.package] version does not match ${PLAIN}."
              echo "::error::Update the version, commit, push main, and re-dispatch."
              grep '^version = ' Cargo.toml || true
              exit 1
            fi

            if git rev-parse --verify "refs/tags/${VERSION}" >/dev/null 2>&1; then
              echo "tag ${VERSION} already exists — reusing existing tag"
            else
              git config user.email "github-actions[bot]@users.noreply.github.com"
              git config user.name  "github-actions[bot]"
              git tag -a "${VERSION}" -m "relay ${VERSION}"
              git push origin "${VERSION}"
              echo "created + pushed tag ${VERSION}"
            fi
          else
            VERSION="${{ github.ref_name }}"
            echo "tag-triggered release: ${VERSION}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  build:
    name: build ${{ matrix.target }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          # v1: Apple Silicon only. Add more lines when there's demand;
          # each additional target costs a runner-minute and a formula
          # `on_*` stanza below.
          - target: aarch64-apple-darwin
            os: macos-14
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.version }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        env:
          # Bake in the hosted endpoint so `brew install relay` users get a
          # working CLI without any config. Self-hosters set this in their
          # fork's workflow (or build with `RELAY_DEFAULT_SERVER=... cargo
          # build --release` locally).
          #
          # Commented until the hosted QUIC endpoint is public; uncomment and
          # fill once the DNS/cert story for it is nailed down.
          # RELAY_DEFAULT_SERVER: tunnel.sharedwithrelay.com:443
          RELAY_DEFAULT_SERVER: ${{ vars.RELAY_DEFAULT_SERVER }}
        run: cargo build --release --target ${{ matrix.target }} --bin relay

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          NAME="relay-${VERSION}-${{ matrix.target }}"
          cp target/${{ matrix.target }}/release/relay dist/relay
          cp README.md LICENSE dist/
          cd dist
          tar czf "${NAME}.tar.gz" relay README.md LICENSE
          shasum -a 256 "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256"
          ls -la

      - uses: actions/upload-artifact@v4
        with:
          name: relay-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256

  release:
    name: publish release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.version }}
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist/

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true

  bump-formula:
    name: bump homebrew formula on main
    needs: [prepare, release]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Regenerate Formula/relay.rb
        shell: bash
        run: |
          set -euo pipefail
          PLAIN_VERSION="${VERSION#v}"
          BASE="https://github.com/${{ github.repository }}/releases/download/${VERSION}"

          SHA_ARM64="$(awk '{print $1}' "dist/relay-${VERSION}-aarch64-apple-darwin.tar.gz.sha256")"

          cat > Formula/relay.rb <<RUBY
          class Relay < Formula
            desc "Self-hostable tunneling — open public URLs for local services over QUIC"
            homepage "https://withrelay.dev"
            version "${PLAIN_VERSION}"
            license "MIT"

            depends_on arch: :arm64
            depends_on :macos

            url "${BASE}/relay-${VERSION}-aarch64-apple-darwin.tar.gz"
            sha256 "${SHA_ARM64}"

            def install
              bin.install "relay"
            end

            test do
              assert_match "relay", shell_output("#{bin}/relay --version")
            end
          end
          RUBY

      - name: Commit + push
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet Formula/relay.rb; then
            echo "formula already up to date"
            exit 0
          fi
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add Formula/relay.rb
          git commit -m "chore: bump homebrew formula to ${VERSION}"
          git push origin HEAD:main
